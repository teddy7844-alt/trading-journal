const OHLC_TICKERS = [
  'SPY','QQQ','XLE','XLB','XLI','XLF','XLK','XLV','XLP','XLY','XLU','XLRE','XLC','IWM',
  'BTC-USD','ETH-USD','GLD','TLT','GDX','SOXX','SMH','XOP','USO','SLV'
];

async function fetchWeeklyOHLC(ticker) {
  // Yahoo Finance v8 API -- 3 months of weekly data
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1wk&range=3mo`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const quotes = data.chart.result[0];
    const timestamps = quotes.timestamp;
    const ohlc = quotes.indicators.quote[0];
    // Return last 6 weekly candles
    const candles = [];
    const len = timestamps.length;
    const start = Math.max(0, len - 6);
    for (let i = start; i < len; i++) {
      candles.push({
        date: new Date(timestamps[i] * 1000).toISOString().slice(0, 10),
        open:  parseFloat(ohlc.open[i]?.toFixed(2)),
        high:  parseFloat(ohlc.high[i]?.toFixed(2)),
        low:   parseFloat(ohlc.low[i]?.toFixed(2)),
        close: parseFloat(ohlc.close[i]?.toFixed(2)),
        volume: ohlc.volume[i]
      });
    }
    return { ticker, candles };
  } catch(e) {
    return { ticker, candles: [], error: e.message };
  }
}

function classifySweepPhase(candles) {
  // Need at least 2 candles
  if (candles.length < 2) return { phase: 'INSUFFICIENT DATA', details: '' };
  
  const prev = candles[candles.length - 2]; // prior week
  const curr = candles[candles.length - 1]; // current/last completed week
  
  const prevHigh = prev.high;
  const prevLow  = prev.low;
  const currHigh = curr.high;
  const currLow  = curr.low;
  const currClose = curr.close;
  const currOpen  = curr.open;
  
  // Sweep detection thresholds
  const sweepThreshold = 0.001; // 0.1% -- wick must exceed level by this much
  
  const sweptHigh = currHigh > prevHigh * (1 + sweepThreshold);
  const sweptLow  = currLow  < prevLow  * (1 - sweepThreshold);
  const rejectedFromHigh = currClose < prevHigh; // closed back below the swept high
  const rejectedFromLow  = currClose > prevLow;  // closed back above the swept low
  
  // Check for SFP (single candle wick through + close back)
  const sfpHigh = sweptHigh && rejectedFromHigh;
  const sfpLow  = sweptLow  && rejectedFromLow;
  
  // Check prior week for roundtrip detection
  let prevSweptHigh = false, prevSweptLow = false;
  if (candles.length >= 3) {
    const prevPrev = candles[candles.length - 3];
    prevSweptHigh = prev.high > prevPrev.high * (1 + sweepThreshold) && prev.close < prevPrev.high;
    prevSweptLow  = prev.low  < prevPrev.low  * (1 - sweepThreshold) && prev.close > prevPrev.low;
  }
  
  // Bullish inside bar / coiling
  const insideBar = currHigh <= prevHigh && currLow >= prevLow;
  
  // Classify
  let phase = 'NEUTRAL';
  let details = '';
  
  if (sfpLow && sfpHigh) {
    // Both sides swept in same candle -- unusual, flag it
    phase = 'COILING';
    details = `Both sides swept and rejected. W: H${currHigh} L${currLow} vs prev H${prevHigh} L${prevLow}`;
  } else if (sfpLow && prevSweptHigh) {
    phase = 'ROUNDTRIP BULLISH';
    details = `Prior wk swept highs, this wk swept lows + rejected. High conviction long. Close: ${currClose}`;
  } else if (sfpHigh && prevSweptLow) {
    phase = 'ROUNDTRIP BEARISH';
    details = `Prior wk swept lows, this wk swept highs + rejected. High conviction short. Close: ${currClose}`;
  } else if (sfpLow) {
    phase = 'ACCUMULATION';
    details = `Lows swept (${currLow} < prev ${prevLow}) + rejected, close: ${currClose}. Sell-side liquidity taken.`;
  } else if (sfpHigh) {
    phase = 'DISTRIBUTION';
    details = `Highs swept (${currHigh} > prev ${prevHigh}) + rejected, close: ${currClose}. Buy-side liquidity taken.`;
  } else if (sweptLow && !rejectedFromLow) {
    phase = 'BEARISH BREAKDOWN';
    details = `Lows swept (${currLow}) and holding below prev low (${prevLow}). Genuine breakdown.`;
  } else if (sweptHigh && !rejectedFromHigh) {
    phase = 'BULLISH BREAKOUT';
    details = `Highs swept (${currHigh}) and holding above prev high (${prevHigh}). Genuine breakout.`;
  } else if (insideBar) {
    phase = 'COILING';
    details = `Inside bar -- coiling within prev range H${prevHigh} L${prevLow}. Breakout imminent.`;
  } else {
    phase = 'NEUTRAL';
    details = `No clear sweep. H${currHigh} L${currLow} vs prev H${prevHigh} L${prevLow}. Close: ${currClose}`;
  }
  
  // Check if it could be LETHAL INJECTION (SFP at key level -- requires context)
  // We flag it for the AI to confirm with timeframe analysis
  const potentialLethal = (sfpLow || sfpHigh) && candles.length >= 4;
  if (potentialLethal && (phase === 'ACCUMULATION' || phase === 'DISTRIBUTION')) {
    details += ' | POTENTIAL LETHAL INJECTION -- confirm with monthly/weekly alignment';
  }
  
  return {
    phase,
    details,
    lastWeek: { open: currOpen, high: currHigh, low: currLow, close: currClose },
    priorWeek: { open: prev.open || 0, high: prevHigh, low: prevLow, close: prev.close },
    swept: { high: sweptHigh, low: sweptLow },
    rejected: { fromHigh: rejectedFromHigh, fromLow: rejectedFromLow }
  };
}

async function fetchAllOHLC(onProgress) {
  const results = {};
  for (let i = 0; i < OHLC_TICKERS.length; i++) {
    const ticker = OHLC_TICKERS[i];
    if (onProgress) onProgress(ticker);
    const data = await fetchWeeklyOHLC(ticker);
    if (data.candles.length > 0) {
      results[ticker] = {
        ...classifySweepPhase(data.candles),
        candles: data.candles
      };
    }
  }
  return results;
}

function formatOHLCForPrompt(ohlcData) {
  let text = '=== REAL WEEKLY OHLC PRICE DATA (Yahoo Finance) ===\n';
  text += 'Sweep phases calculated from actual candle math -- use these as ground truth:\n\n';
  
  for (const [ticker, data] of Object.entries(ohlcData)) {
    text += `${ticker}: PHASE=${data.phase}\n`;
    text += `  Last week: O${data.lastWeek?.open} H${data.lastWeek?.high} L${data.lastWeek?.low} C${data.lastWeek?.close}\n`;
    text += `  Prior week: H${data.priorWeek?.high} L${data.priorWeek?.low}\n`;
    text += `  Analysis: ${data.details}\n\n`;
  }
  return text;
}

async function searchPhase(searchPrompt, apiKey, onProgress) {
  // Phase 1: do all web searches, return raw research summary (no JSON required)
  const headers = {
    "Content-Type": "application/json",
    "x-api-key": apiKey,
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };
  const tools = [{ type: "web_search_20250305", name: "web_search" }];
  let messages = [{ role: "user", content: searchPrompt }];
  for (let i = 0; i < 15; i++) {
    if (onProgress) onProgress(i);
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers,
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4000, tools, messages }),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    const raw = await res.json();
    messages.push({ role: "assistant", content: raw.content });
    if (raw.stop_reason === "end_turn") {
      return raw.content.filter(b => b.type === "text").map(b => b.text).join("\n");
    }
    const toolUse = raw.content.filter(b => b.type === "tool_use");
    if (!toolUse.length) {
      return raw.content.filter(b => b.type === "text").map(b => b.text).join("\n");
    }
    messages.push({ role: "user", content: toolUse.map(b => ({ type: "tool_result", tool_use_id: b.id, content: b.content || "" })) });
  }
  throw new Error("Search phase max iterations reached");
}

async function synthesizePhase(researchSummary, synthesisPrompt, apiKey) {
  // Phase 2: no web search -- just synthesize research into JSON
  const headers = {
    "Content-Type": "application/json",
    "x-api-key": apiKey,
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };
  const fullPrompt = synthesisPrompt + "\n\n=== RESEARCH DATA ===\n" + researchSummary;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 8000,
      messages: [{ role: "user", content: fullPrompt }]
    }),
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  const raw = await res.json();
  const text = raw.content.filter(b => b.type === "text").map(b => b.text).join("\n");
  const cleaned = text.replace(/```json|```/g, "").trim();
  const m = cleaned.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("No JSON in synthesis response");

  function robustParse(jsonStr) {
    // Attempt 1: direct parse
    try { return JSON.parse(jsonStr); } catch(e1) {}
    // Attempt 2: fix unescaped quotes inside string values
    // Strategy: use a char-by-char state machine to find and escape bad quotes
    try {
      let fixed = "";
      let inString = false;
      let escaped = false;
      let i = 0;
      while (i < jsonStr.length) {
        const ch = jsonStr[i];
        const next = jsonStr[i+1];
        if (escaped) { fixed += ch; escaped = false; i++; continue; }
        if (ch === '\\') { fixed += ch; escaped = true; i++; continue; }
        if (ch === '"' && !inString) { inString = true; fixed += ch; i++; continue; }
        if (ch === '"' && inString) {
          // Check if this is a legitimate closing quote
          // A legitimate closing quote is followed by: , } ] whitespace newline :
          let j = i + 1;
          while (j < jsonStr.length && (jsonStr[j] === ' ' || jsonStr[j] === '\t')) j++;
          const afterChar = jsonStr[j];
          if ([',', '}', ']', ':', '\n', '\r'].includes(afterChar) || j >= jsonStr.length) {
            inString = false; fixed += ch; i++; continue;
          } else {
            // Unescaped quote inside a string -- escape it
            fixed += '\\"'; i++; continue;
          }
        }
        fixed += ch; i++;
      }
      return JSON.parse(fixed);
    } catch(e2) {}
    // Attempt 3: fix truncation
    try {
      let fixed = jsonStr.replace(/,\s*"[^"]*$/, '').replace(/,\s*$/, '');
      let opens = (fixed.match(/\[/g)||[]).length - (fixed.match(/\]/g)||[]).length;
      let openb = (fixed.match(/\{/g)||[]).length - (fixed.match(/\}/g)||[]).length;
      for (let i = 0; i < opens; i++) fixed += ']';
      for (let i = 0; i < openb; i++) fixed += '}';
      return JSON.parse(fixed);
    } catch(e3) {
      throw new Error("JSON parse failed after all attempts: " + e3.message);
    }
  }
  const parsed = robustParse(m[0]);
  // Strip ALL cite tags from every string field recursively
  function stripAllCites(obj) {
    if (typeof obj === 'string') {
      return obj.replace(/<cite[^>]*>/gi, '').replace(/<\/cite>/gi, '').trim();
    }
    if (Array.isArray(obj)) return obj.map(stripAllCites);
    if (obj && typeof obj === 'object') {
      const out = {};
      for (const k in obj) out[k] = stripAllCites(obj[k]);
      return out;
    }
    return obj;
  }
  return stripAllCites(parsed);
}

async function callClaude(prompt, apiKey, onProgress) {
  // Split prompt into search phase and synthesis phase
  const splitMarker = "After ALL searches, synthesize findings.";
  const splitIdx = prompt.indexOf(splitMarker);
  const searchPrompt = splitIdx > -1
    ? prompt.slice(0, splitIdx + splitMarker.length) + "\n\nAfter ALL searches are done, write a detailed plain-text research summary of everything you found. Cover: ETF flows, COT positioning, sweep levels for QQQ/SPY/XLF/XLK/XLE/XLV/XLI/XLY/XLP/IWM/BTC, macro events, options sentiment, and AAII/FedWatch data. Be specific with price levels and data points. No JSON yet."
    : prompt + "\n\nWrite a detailed plain-text research summary of your findings. No JSON.";

  const synthesisPrompt = `You are an elite institutional trading analyst. Using the research data below, synthesize a complete weekly rotation forecast. Apply the liquidity sweep framework strictly.

MANDATORY REQUIREMENTS - ALL of these sections MUST be in your JSON output:
- liquiditySweepMap: REQUIRED array with 8+ entries (SPY, QQQ, XLE, XLB, XLI, XLF, XLK, IWM, BTC, ETH minimum)
- cot.nq and cot.es: REQUIRED objects - use OHLC and research data to populate, estimate if needed
- If you skip liquiditySweepMap or cot you have failed the task

CRITICAL JSON RULES:
1. Output ONLY raw JSON - no markdown, no backticks, no explanation text
2. Never use double quotes inside string values - use single quotes or rephrase
3. No XML/HTML tags in any string values - plain text only
4. Use the OHLC price data in the research to determine sweep phases from actual candle math

` + prompt.slice(prompt.indexOf("Output ONLY"));

  if (onProgress) onProgress(0);
  // Fetch real OHLC data first -- this runs in parallel with loading animation
  let ohlcText = '';
  try {
    const ohlcData = await fetchAllOHLC();
    ohlcText = formatOHLCForPrompt(ohlcData);
  } catch(e) {
    ohlcText = '[OHLC fetch failed -- using web search data only]';
  }
  
  // Inject OHLC data into search prompt
  const enrichedSearchPrompt = searchPrompt + '\n\n' + ohlcText;
  const research = await searchPhase(enrichedSearchPrompt, apiKey, onProgress);
  if (onProgress) onProgress(13);
  // Compress research to stay under token limits (keep first 6000 chars)
  const compressedResearch = research.length > 10000
    ? research.slice(0, 10000) + "\n[...additional research truncated for token efficiency]"
    : research;
  const forecast = await synthesizePhase(compressedResearch, synthesisPrompt, apiKey);
  
  // POST-PROCESS: Override liquiditySweepMap with REAL OHLC prices
  if (forecast.liquiditySweepMap && ohlcData && Object.keys(ohlcData).length > 0) {
    forecast.liquiditySweepMap = forecast.liquiditySweepMap.map(entry => {
      const real = ohlcData[entry.ticker];
      if (!real || !real.lastWeek) return entry;
      const { high, low, close } = real.lastWeek;
      const ph = real.priorWeek?.high, pl = real.priorWeek?.low;
      let recentSweep = entry.recentSweep;
      if (real.phase === 'ACCUMULATION' && pl)
        recentSweep = 'Lows swept below prior wk low ' + pl.toFixed(2) + ', closed back above at ' + close.toFixed(2);
      else if (real.phase === 'DISTRIBUTION' && ph)
        recentSweep = 'Highs swept above prior wk high ' + ph.toFixed(2) + ', closed back below at ' + close.toFixed(2);
      else if (real.phase === 'ROUNDTRIP BULLISH')
        recentSweep = 'Roundtrip: highs swept then lows swept last -- close ' + close.toFixed(2);
      else if (real.phase === 'ROUNDTRIP BEARISH')
        recentSweep = 'Roundtrip: lows swept then highs swept last -- close ' + close.toFixed(2);
      else if (real.phase === 'COILING' && ph && pl)
        recentSweep = 'Inside range H' + ph.toFixed(2) + ' L' + pl.toFixed(2) + ', coiling. Close: ' + close.toFixed(2);
      else if (real.phase === 'BULLISH BREAKOUT' && ph)
        recentSweep = 'Broke above prior wk high ' + ph.toFixed(2) + ', holding at ' + close.toFixed(2);
      else if (real.phase === 'BEARISH BREAKDOWN' && pl)
        recentSweep = 'Broke below prior wk low ' + pl.toFixed(2) + ', holding at ' + close.toFixed(2);
      else if (ph && pl)
        recentSweep = 'Range H' + high.toFixed(2) + ' L' + low.toFixed(2) + ' vs prior H' + ph.toFixed(2) + ' L' + pl.toFixed(2) + '. Close: ' + close.toFixed(2);
      const sig = (real.phase && real.phase !== 'NEUTRAL' && real.phase !== 'INSUFFICIENT DATA') ? real.phase : entry.signal;
      return { ...entry, recentSweep, signal: sig };
    });
  }
  
  return forecast;
}

  );
}

function WatchCard({ item, rank }) {
  const isLong = item.direction === "LONG";
  const col = isLong ? "#00ff88" : "#ff3366";
  const convCol = CONVICTION_COLORS[item.conviction] || "#ffaa00";
  const sweep = item.sweepStatus || "";
  const sweepCol = sweep === "LETHAL INJECTION" ? "#00ff88"
    : sweep.includes("LOWS SWEPT") || sweep === "ROUNDTRIP BULLISH" ? "#44dd88"
    : sweep.includes("SFP") ? "#ffaa00"
    : sweep.includes("HIGHS SWEPT") || sweep === "ROUNDTRIP BEARISH" ? "#ff6644"
    : "#666688";
  const tfCol = item.timeframeAlignment === "WEEKLY + DAILY" ? "#00ff88"
    : item.timeframeAlignment === "WEEKLY ONLY" ? "#88ffaa"
    : "#ffaa44";
  return (
    <div className="fadein" style={{ background:"#060e08", border:'1px solid '+col+'33', borderLeft:`3px solid ${col}`, borderRadius:"3px", padding:"14px 16px", position:"relative", marginBottom:"10px" }}>
      <div style={{ position:"absolute", top:"10px", right:"12px", fontSize:"22px", fontWeight:"700", color:col+'22', fontFamily:"'Rajdhani',sans-serif" }}>#{rank}</div>
      <div style={{ display:"flex", alignItems:"flex-start", gap:"12px", flexWrap:"wrap" }}>
        <div style={{ minWidth:"80px" }}>
          <div style={{ fontSize:"20px", fontWeight:"700", color:col, letterSpacing:"2px", fontFamily:"'Rajdhani',sans-serif" }}>{item.ticker}</div>
          <div style={{ fontSize:"10px", color:"#4a7a5a", letterSpacing:"2px", marginTop:"2px" }}>{item.type}</div>
          <div style={{ fontSize:"9px", color:col, letterSpacing:"1px", marginTop:"4px", border:'1px solid '+col+'44', borderRadius:"2px", padding:"2px 5px", display:"inline-block" }}>{item.direction}</div>
        </div>
        <div style={{ flex:1, minWidth:"160px" }}>
          <div style={{ fontSize:"13px", color:"#c8e8c8", marginBottom:"6px", lineHeight:"1.6" }}>{item.name}</div>
          <div style={{ fontSize:"12px", color:"#6a9a7a", lineHeight:"1.7", marginBottom:"8px" }}>{item.reason}</div>
          {sweep && (
            <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:"4px" }}>

Institutional money moves by sweeping liquidity at key structural levels then reversing. The tradeable event is NOT the breakout -- it is the FAILURE of the breakout.
- SELL-SIDE SWEEP: Price wicks below a key low, closes back above = institutions absorbed sell stops = ACCUMULATION = money flowing IN
- BUY-SIDE SWEEP: Price wicks above a key high, closes back below = institutions distributed into buy stops = DISTRIBUTION = money flowing OUT
- SFP (Swing Failure Pattern): Single candle wick through key level, closes back = EARLY WARNING of flow reversal before confirmation
- LETHAL INJECTION: SFP at key level + weekly timeframe confirms rejection = MAXIMUM CONVICTION signal
- ROUNDTRIP BULLISH: Asset swept highs first (distribution), then swept lows (accumulation) = primed to return to highs = HIGHEST CONVICTION LONG
- CONFLICTING SIGNAL TRAP: Daily shows inflow but weekly structure is distributing = institutional money EXITING into retail buying = EXPLICIT TRAP, do NOT recommend

Weekly sweep + rejection + daily confirmation = HIGH conviction (flag as LETHAL INJECTION if SFP present)
Weekly sweep + rejection only = MEDIUM-HIGH conviction

- ROUNDTRIP BEARISH: Both sides swept, highs swept LAST = highest conviction short

              <div style={{ fontSize:"11px", color:"#2a5a6a", letterSpacing:"4px", textTransform:"uppercase", marginBottom:"12px", paddingBottom:"7px", borderBottom:"1px solid #0a1a2a" }}> SECTOR FLOW RANKING</div>
              <div style={{ display:"grid", gap:"5px" }}>
                {data.sectorRanking?.sort((a,b)=>a.rank-b.rank).map(s => {
                  const isIn = s.flow?.includes("IN");
                  const isStrong = s.flow?.includes("STRONG");
                  const col = isIn ? (isStrong?"#00ff88":"#44aa66") : s.flow==="NEUTRAL" ? "#666688" : (isStrong?"#ff3366":"#aa4444");
                  return (
                    <div key={s.etf} style={{ display:"flex", alignItems:"center", gap:"10px", padding:"7px 10px", background:"#050a06", borderRadius:"2px", border:"1px solid #0a1a0a" }}>
                      <span style={{ fontSize:"12px", color:"#2a4a3a", minWidth:"18px" }}>#{s.rank}</span>
                      <span style={{ fontSize:"13px", fontWeight:"700", color:col, minWidth:"40px", fontFamily:"'Rajdhani',sans-serif" }}>{s.etf}</span>
                      <span style={{ fontSize:"11px", color:"#4a7a5a", flex:1 }}>{s.name}</span>
                      {s.sweepPhase && (() => {
                        const phCol = s.sweepPhase === "ACCUMULATION" || s.sweepPhase === "ROUNDTRIP BULLISH" ? "#44dd88"
                          : s.sweepPhase === "DISTRIBUTION" || s.sweepPhase === "ROUNDTRIP BEARISH" ? "#ff6655"
                          : "#666688";
                        return <span style={{ fontSize:"9px", color:phCol, border:'1px solid '+phCol+'33', borderRadius:"2px", padding:"2px 6px", letterSpacing:"1px", minWidth:"90px", textAlign:"center" }}>{s.sweepPhase}</span>;
                      })()}
                      <span style={{ fontSize:"10px", color:col, letterSpacing:"1px", textAlign:"right", minWidth:"100px" }}>{s.flow}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* LIQUIDITY SWEEP MAP */}
          {data.liquiditySweepMap?.length > 0 && (
            <div style={{ marginBottom:"16px" }}>
              <div style={{ fontSize:"11px", color:"#00cc66", letterSpacing:"4px", textTransform:"uppercase", marginBottom:"12px", paddingBottom:"7px", borderBottom:"1px solid #003322" }}>
                 LIQUIDITY SWEEP MAP - INSTITUTIONAL FLOW STRUCTURE
              </div>
              <div style={{ display:"grid", gap:"8px" }}>
                {data.liquiditySweepMap.map((item, i) => {
                  const sig = item.signal || "";
                  const sigCol = sig === "LETHAL INJECTION" ? "#00ff88"
                    : sig === "ACCUMULATION"  ? "#44dd88"
                    : sig === "SFP WARNING"   ? "#ffaa00"
                    : sig === "DISTRIBUTION"  ? "#ff3366"
                    : "#666688";
                  const rejCol = item.rejected === "YES" ? "#00ff88" : "#ff3366";
                  return (
                    <div key={i} style={{ background:"#050e08", border:'1px solid '+sigCol+'22', borderLeft:`3px solid ${sigCol}66`, borderRadius:"3px", padding:"12px 16px", display:"grid", gridTemplateColumns:"80px 1fr 1fr auto", gap:"12px", alignItems:"start" }}>
                      <div>
                        <div style={{ fontSize:"15px", fontWeight:"700", color:"#c8f0d8", fontFamily:"'Rajdhani',sans-serif", letterSpacing:"1px" }}>{item.ticker}</div>
                        <div style={{ fontSize:"9px", color:rejCol, letterSpacing:"2px", marginTop:"3px" }}>{item.rejected === "YES" ? "v REJECTED" : " NO REJECT"}</div>
                      </div>
                      <div>
                        <div style={{ fontSize:"9px", color:"#2a5a3a", letterSpacing:"2px", marginBottom:"4px" }}>RECENT SWEEP</div>
                        <div style={{ fontSize:"11px", color:"#8ab89a", lineHeight:"1.6" }}>{item.recentSweep}</div>
                      </div>
                      <div>
                        <div style={{ fontSize:"9px", color:"#2a5a3a", letterSpacing:"2px", marginBottom:"4px" }}>IMPLICATION</div>
                        <div style={{ fontSize:"11px", color:"#7aaa8a", lineHeight:"1.6" }}>{item.implication}</div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:"9px", fontWeight:"700", color:sigCol, border:'1px solid '+sigCol+'55', borderRadius:"2px", padding:"3px 8px", letterSpacing:"1px", whiteSpace:"nowrap" }}>{sig}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* SWEEP PHASE MAP */}
          {data.sweepPhaseMap?.length > 0 && (
            <div style={{ marginBottom:"16px" }}>
              <div style={{ fontSize:"11px", color:"#3a6a5a", letterSpacing:"4px", textTransform:"uppercase", marginBottom:"12px", paddingBottom:"7px", borderBottom:"1px solid #0a2a1a" }}>
                 LIQUIDITY SWEEP PHASE MAP - INSTITUTIONAL POSITIONING
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px,1fr))", gap:"8px" }}>
                {data.sweepPhaseMap.map((item, i) => {
                  const phase = item.phase || "";
                  const col = phase === "LETHAL INJECTION"    ? "#00ff88"
                    : phase === "ROUNDTRIP BULLISH"           ? "#44ffaa"
                    : phase === "ACCUMULATION"                ? "#44cc88"
                    : phase === "SFP WARNING"                 ? "#ffcc00"
                    : phase === "COILING"                     ? "#8888ff"
                    : phase === "DISTRIBUTION"                ? "#ff6644"
                    : phase === "ROUNDTRIP BEARISH"           ? "#ff3366"
                    : "#666688";
                  const phaseBg = phase === "LETHAL INJECTION"    ? "#001a0d"
                    : phase === "ROUNDTRIP BULLISH"               ? "#001508"
                    : phase === "ACCUMULATION"                    ? "#001008"
                    : phase === "SFP WARNING"                     ? "#1a1400"
                    : phase === "COILING"                         ? "#08080f"
                    : phase === "DISTRIBUTION"                    ? "#1a0800"
                    : phase === "ROUNDTRIP BEARISH"               ? "#1a0008"
                    : "#080808";
                  const phaseIcon = phase === "LETHAL INJECTION"    ? ""
                    : phase === "ROUNDTRIP BULLISH"                 ? ""
                    : phase === "ACCUMULATION"                      ? ""
                    : phase === "SFP WARNING"                       ? "!"
                    : phase === "COILING"                           ? ""
                    : phase === "DISTRIBUTION"                      ? ""
                    : phase === "ROUNDTRIP BEARISH"                 ? ""
                    : "-";
                  return (
                    <div key={i} style={{ background:phaseBg, border:'1px solid '+col+'33', borderTop:'2px solid '+col, borderRadius:"3px", padding:"10px 12px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"6px" }}>
                        <div style={{ fontSize:"16px", fontWeight:"700", color:"#c8f0d8", fontFamily:"'Rajdhani',sans-serif", letterSpacing:"1px" }}>{item.ticker}</div>
                        <div style={{ fontSize:"14px", color:col }}>{phaseIcon}</div>
                      </div>
                      <div style={{ fontSize:"9px", fontWeight:"700", color:col, letterSpacing:"2px", marginBottom:"6px", lineHeight:"1.3" }}>{phase}</div>
                      <div style={{ display:"flex", gap:"4px", marginBottom:"6px", flexWrap:"wrap" }}>
                        <span style={{ fontSize:"8px", color: item.rejected === "YES" ? "#00ff88" : "#ff6644", border:`1px solid ${item.rejected === "YES" ? "#00ff8844" : "#ff664444"}`, borderRadius:"2px", padding:"1px 5px" }}>
                          {item.rejected === "YES" ? "v REJECTED" : " NO REJECT"}
                        </span>
                        <span style={{ fontSize:"8px", color: item.weeklyConfirmed === "YES" ? "#00ff88" : item.weeklyConfirmed === "PENDING" ? "#ffaa00" : "#ff6644", border:"1px solid #1a3a2a", borderRadius:"2px", padding:"1px 5px" }}>
                          WKY: {item.weeklyConfirmed || "?"}
                        </span>
                      </div>
                      <div style={{ fontSize:"10px", color:"#5a8a6a", lineHeight:"1.6" }}>{item.lastSweep}</div>
                      {item.sequenceNote && <div style={{ fontSize:"10px", color:col+'99', lineHeight:"1.6", marginTop:"4px", borderTop:'1px solid '+col+'22', paddingTop:"4px" }}>{item.sequenceNote}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* KEY EVENTS */}
          <div style={{ marginBottom:"16px" }}>
            <div style={{ fontSize:"11px", color:"#2a4a6a", letterSpacing:"4px", textTransform:"uppercase", marginBottom:"12px", paddingBottom:"7px", borderBottom:"1px solid #0a1a2a" }}> KEY EVENTS THIS WEEK - FLOW MOVERS</div>
            {data.keyEvents?.map((e,i) => <EventCard key={i} event={e}/>)}
          </div>

          {/* SCENARIOS */}
          <div style={{ marginBottom:"16px" }}>
            <div style={{ fontSize:"11px", color:"#4a4a2a", letterSpacing:"4px", textTransform:"uppercase", marginBottom:"12px", paddingBottom:"7px", borderBottom:"1px solid #1a1a0a" }}> WEEK SCENARIOS</div>
            <div style={{ display:"flex", gap:"10px", flexWrap:"wrap" }}>
              {data.scenarios?.map((s,i) => <ScenarioCard key={i} scenario={s}/>)}
            </div>
          </div>

          {/* COT PANEL */}
          {data.cot && (
            <div style={{ marginBottom:"16px" }}>
              <div style={{ fontSize:"11px", color:"#6a4a7a", letterSpacing:"4px", textTransform:"uppercase", marginBottom:"12px", paddingBottom:"7px", borderBottom:"1px solid #2a0a3a" }}>
                 COT SMART MONEY POSITIONING - CFTC DATA
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"10px" }}>
                {[["NQ FUTURES", data.cot.nq], ["ES / SPX FUTURES", data.cot.es]].map(([label, cot]) => {
                  if (!cot) return null;
                  const sigCol = cot.signal?.includes("STRONG") ? "#00ff88" : cot.signal?.includes("CROWDED") ? "#ffaa00" : cot.signal?.includes("SHORT") ? "#ff3366" : "#8888ff";
                  const commCol = cot.commercialNet === "LONG" ? "#00ff88" : cot.commercialNet === "SHORT" ? "#ff3366" : "#888888";
                  const specCol = cot.largeSpecNet === "LONG" ? "#00ff88" : cot.largeSpecNet === "SHORT" ? "#ff3366" : "#888888";
                  return (
                    <div key={label} style={{ background:"#080610", border:'1px solid '+sigCol+'33', borderLeft:`3px solid ${sigCol}`, borderRadius:"3px", padding:"14px 16px" }}>
                      <div style={{ fontSize:"10px", color:"#4a2a6a", letterSpacing:"3px", marginBottom:"10px" }}>{label}</div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"10px" }}>
                        <div style={{ background:"#060410", borderRadius:"2px", padding:"8px 10px", border:"1px solid #1a0a2a" }}>
                          <div style={{ fontSize:"9px", color:"#4a2a6a", letterSpacing:"2px", marginBottom:"4px" }}>COMMERCIALS</div>
                          <div style={{ fontSize:"16px", fontWeight:"700", color:commCol, fontFamily:"'Rajdhani',sans-serif" }}>{cot.commercialNet}</div>
                          <div style={{ fontSize:"9px", color:"#3a2a4a", marginTop:"3px" }}>SMART MONEY  FOLLOW</div>
                        </div>
                        <div style={{ background:"#060410", borderRadius:"2px", padding:"8px 10px", border:"1px solid #1a0a2a" }}>
                          <div style={{ fontSize:"9px", color:"#4a2a6a", letterSpacing:"2px", marginBottom:"4px" }}>LARGE SPECS</div>
                          <div style={{ fontSize:"16px", fontWeight:"700", color:specCol, fontFamily:"'Rajdhani',sans-serif" }}>{cot.largeSpecNet}</div>
                          <div style={{ fontSize:"9px", color:cot.largeSpecExtreme==="YES"?"#ffaa00":"#3a2a4a", marginTop:"3px" }}>{cot.largeSpecExtreme==="YES"?"! EXTREME -- FADE":"MODERATE POSITIONING"}</div>
                        </div>
                      </div>
                      <div style={{ fontSize:"10px", letterSpacing:"2px", fontWeight:"700", color:sigCol, border:'1px solid '+sigCol+'44', borderRadius:"2px", padding:"4px 10px", display:"inline-block", marginBottom:"8px" }}>{cot.signal}</div>
                      <div style={{ fontSize:"11px", color:"#8a7a9a", lineHeight:"1.7" }}>{cot.interpretation}</div>
                    </div>
                  );
                })}
              </div>
              {data.cot.cotNote && (
                <div style={{ background:"#060410", border:"1px solid #2a0a3a", borderRadius:"3px", padding:"10px 14px" }}>
                  <div style={{ fontSize:"9px", color:"#4a2a6a", letterSpacing:"3px", marginBottom:"5px" }}>COT SUMMARY</div>
                  <div style={{ fontSize:"12px", color:"#c8b8d8", lineHeight:"1.7" }}>{data.cot.cotNote}</div>
                </div>
              )}
            </div>
          )}

          {/* ANALYST NOTE */}
          {data.analystNote && (
            <div style={{ background:"#060808", border:"1px solid #ffaa0022", borderLeft:"3px solid #ffaa00", borderRadius:"3px", padding:"14px 18px", marginBottom:"16px" }}>
              <div style={{ fontSize:"10px", color:"#aa7700", letterSpacing:"3px", marginBottom:"7px" }}> ANALYST NOTE - WHAT MOST TRADERS WILL MISS</div>
              <div style={{ fontSize:"13px", color:"#c8b888", lineHeight:"1.8" }}>{stripCite(data.analystNote)}</div>
            </div>
          )}

          {/* DATA SOURCES */}
          {data.flowSources?.length > 0 && (
            <div style={{ background:"#050608", border:"1px solid #0a0a1a", borderRadius:"3px", padding:"10px 16px", marginBottom:"16px" }}>
              <div style={{ fontSize:"10px", color:"#2a2a5a", letterSpacing:"3px", marginBottom:"6px" }}>DATA SOURCES USED</div>
              <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                {data.flowSources.map((s,i) => (
                  <span key={i} style={{ fontSize:"10px", color:"#3a3a6a", border:"1px solid #1a1a3a", borderRadius:"2px", padding:"2px 8px" }}>{s}</span>
                ))}
              </div>
            </div>
          )}

          <div style={{ fontSize:"10px", color:"#1a3a2a", textAlign:"right", paddingTop:"10px", borderTop:"1px solid #0a1a0a", letterSpacing:"2px" }}>
             GENERATED {data.generatedAt} - FOR WEEK OF {data.weekOf}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
